<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets & Sites</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary);
        }

        .category-section {
            max-width: 1000px;
            margin: 0 auto 40px auto;
        }

        .category-title {
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #475569;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.25rem;
        }

        .card p {
            color: #64748b;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .card a {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .card a:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <header>
        <h1>Mes Sites Web</h1>
        <p>Retrouvez ici l'ensemble de mes portails et applications</p>
    </header>

    <main id="portfolio-container">
        </main>

    <script>
        // LA LISTE DE TES SITES
        const mesSites = [
            {
                titre: "Parashiot",
                description: "Application Lovable pour le suivi et l'étude des Parashiot.",
                url: "https://parashiot.lovable.app/",
                categorie: "Torah & Étude"
            },
            {
                titre: "Tehilim",
                description: "Portail dédié à la lecture des Tehilim.",
                url: "https://gregysite.github.io/Tehilim/",
                categorie: "Torah & Étude"
            },
            {
                titre: "Ohavei Tsion",
                description: "Site communautaire et informatif sur Jérusalem.",
                url: "https://ohaveitsion.github.io/Jerusalem/",
                categorie: "Jérusalem"
            },
            {
                titre: "Le Kotel",
                description: "Projet autour du Mur des Lamentations.",
                url: "https://gregysite.github.io/Kotel",
                categorie: "Jérusalem"
            }
        ];

        // MOTEUR D'AFFICHAGE (Génère automatiquement les catégories et les cartes)
        const container = document.getElementById('portfolio-container');

        // Extraire les catégories uniques
        const categories = [...new Set(mesSites.map(site => site.categorie))];

        // Générer le HTML pour chaque catégorie
        categories.forEach(categorie => {
            const section = document.createElement('div');
            section.className = 'category-section';
            
            const titreSection = document.createElement('h2');
            titreSection.className = 'category-title';
            titreSection.textContent = categorie;
            section.appendChild(titreSection);

            const grid = document.createElement('div');
            grid.className = 'grid-container';

            const sitesDeLaCategorie = mesSites.filter(site => site.categorie === categorie);
            
            sitesDeLaCategorie.forEach(site => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${site.titre}</h3>
                    <p>${site.description}</p>
                    <a href="${site.url}" target="_blank" rel="noopener noreferrer">Ouvrir le site</a>
                `;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            container.appendChild(section);
        });
    </script>

</body>
</html>
