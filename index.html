<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDev | Project Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b2b;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
            --sub-bg: rgba(88, 166, 255, 0.03); /* Teinte bleutée très subtile */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
            letter-spacing: -1px;
            font-weight: 800;
        }

        header p { color: var(--text-dim); margin-top: 8px; font-size: 1.1rem; }

        .container { max-width: 1100px; margin: 0 auto; }

        .category-title {
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            font-weight: 700;
        }

        .category-title::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--border);
            margin-left: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        /* Styles des Cartes Principales */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
        }

        a.card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .preview {
            width: 100%;
            height: 170px;
            background: #000;
            background-size: cover;
            background-position: top center;
            border-bottom: 1px solid var(--border);
        }

        .content { padding: 20px; flex-grow: 1; }

        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .card-header i { color: var(--accent); }
        .card-header h3 { margin: 0; font-size: 1.25rem; color: #f0f6fc; }

        .desc { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 0; }

        /* --- Zone des Sous-rubriques (Miklat) --- */
        .sub-container {
            grid-column: 1 / -1; /* Prend toute la largeur de la grille */
            margin-top: -10px;
            padding: 20px;
            background: var(--sub-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Styles des Sous-cartes (Mini-cartes) */
        .sub-card {
            background: var(--bg); /* Fond plus sombre pour contraster */
            border-radius: 10px;
            border: 1px solid var(--border);
            text-decoration: none;
            color: var(--text-main);
            overflow: hidden;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }

        .sub-card:hover { 
            border-color: var(--accent); 
            background: #1c2128;
            color: #fff;
        }

        .sub-preview {
            width: 100%;
            height: 120px; /* Plus petite que la principale */
            background: #000;
            background-size: cover;
            background-position: top center;
            border-bottom: 1px solid var(--border);
        }

        .sub-content {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .sub-content i { color: var(--accent); opacity: 0.8; }

        .private-badge {
            font-size: 0.65rem;
            background: rgba(248, 81, 73, 0.1);
            color: #f85149;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid rgba(248, 81, 73, 0.2);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .sub-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MyDev</h1>
        <p>A centralized hub for my tools, study platforms, and tech experiments.</p>
    </header>

    <div class="container" id="main-container"></div>

    <script>
        // API de capture d'écran automatique (thum.io)
        // Crop/800 permet de limiter la hauteur de capture pour un chargement plus rapide
        const getShot = (url) => `https://image.thum.io/get/width/600/crop/800/${url}`;

        const projects = [
            { title: "Parashiot", desc: "Weekly Torah portion study and tracking tool.", url: "https://parashiot.lovable.app/", cat: "Torah & Study", icon: "book-open" },
            { title: "Tehilim", desc: "Interactive reading platform for Tehilim study.", url: "https://gregysite.github.io/Tehilim/", cat: "Torah & Study", icon: "scroll" },
            { title: "Mishna", desc: "Comprehensive digital portal for Mishnaic texts.", url: "https://gregysite.github.io/Mishna/", cat: "Torah & Study", icon: "library" },
            { title: "Ohavei Tsion", desc: "Jerusalem community hub and local info portal.", url: "https://ohaveitsion.github.io/Jerusalem/", cat: "Jerusalem", icon: "map-pin" },
            { title: "The Kotel", desc: "A digital experience focused on the Western Wall.", url: "https://gregysite.github.io/Kotel", cat: "Jerusalem", icon: "landmark" },
            { title: "Wash Timer", desc: "Household utility for smart shower duration management.", url: "http://washtimer.lovable.app/", cat: "Web Apps", icon: "timer" },
            { title: "MyDressing", desc: "Visual organizer for wardrobe and style planning.", url: "https://mydressing.lovable.app/", cat: "Web Apps", icon: "shirt" },
            { title: "Link Players", desc: "Connectivity dashboard for player networking.", url: "https://linkplayers.lovable.app/", cat: "Web Apps", icon: "users" },
            { 
                title: "Alert Miklat", 
                desc: "Integrated safety information and shelter alert system.", 
                url: "https://gregysite.github.io/AlertMiklat/", 
                cat: "Web Apps", 
                icon: "shield-alert",
                // Sous-rubriques spécifiques
                subs: [
                    { title: "Defense Spending", url: "https://gregysite.github.io/AlertMiklat/compteur.html", icon: "trending-up" },
                    { title: "Missile Analytics", url: "https://gregysite.github.io/AlertMiklat/analytics.html", icon: "bar-chart-3" }
                ]
            },
            { title: "Tele Portal", desc: "Private dashboard for media and IPTV management.", url: "", cat: "Media", icon: "tv", isPrivate: true }
        ];

        const container = document.getElementById('main-container');
        const categories = [...new Set(projects.map(p => p.cat))];

        categories.forEach(cat => {
            // Nettoyage du titre de la catégorie pour l'ID HTML
            const catId = cat.replace(/\s|&/g, '');
            container.innerHTML += `<div class="category-title">${cat}</div><div class="grid" id="grid-${catId}"></div>`;
            const grid = document.getElementById(`grid-${catId}`);

            projects.filter(p => p.cat === cat).forEach(p => {
                const isP = p.isPrivate;
                const card = `
                    <a href="${isP ? '#' : p.url}" class="card" ${isP ? '' : 'target="_blank"'}>
                        <div class="preview" style="background-image: url('${isP ? 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600' : getShot(p.url)}')"></div>
                        <div class="content">
                            <div class="card-header">
                                <i data-lucide="${p.icon}" size="20"></i>
                                <h3>${p.title}</h3>
                            </div>
                            <p class="desc">${p.desc}</p>
                            ${isP ? '<div style="margin-top:15px"><span class="private-badge">Private</span></div>' : ''}
                        </div>
                    </a>
                `;
                grid.innerHTML += card;

                // Gestion des sous-rubriques (subs) si elles existent
                if (p.subs) {
                    const subGrid = document.createElement('div');
                    subGrid.className = 'sub-container';
                    p.subs.forEach(sub => {
                        subGrid.innerHTML += `
                            <a href="${sub.url}" target="_blank" class="sub-card">
                                <div class="sub-preview" style="background-image: url('${getShot(sub.url)}')"></div>
                                <div class="sub-content">
                                    <i data-lucide="${sub.icon}" size="18"></i>
                                    <span>${sub.title}</span>
                                </div>
                            </a>
                        `;
                    });
                    grid.appendChild(subGrid);
                }
            });
        });

        // Initialisation des icônes Lucide après la génération du HTML
        lucide.createIcons();
    </script>
</body>
</html>
