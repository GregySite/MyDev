<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-800">Mes Réalisations</h1>
                <p class="text-slate-500 mt-1">Index centralisé de mes outils et applications.</p>
            </div>
            <div id="stats" class="text-sm font-medium text-slate-400 bg-white px-3 py-1 rounded-full shadow-sm border border-slate-100">
                </div>
        </header>

        <main id="container" class="space-y-8">
            </main>
    </div>

    <script>
        // --- BASE DE DONNÉES (Ajoute tes nouveaux sites ici) ---
        const sites = [
            { nom: "JLM Tech Solutions", desc: "Maintenance IT & Électronique", url: "https://jlmtech.example.com", cat: "Business", icone: "fa-tools" },
            { nom: "Wash Timer 2.0", desc: "Gestion intelligente des cycles", url: "https://wash.example.com", cat: "Apps", icone: "fa-stopwatch" },
            { nom: "Portal Tele", desc: "Interface IPTV personnalisée", url: "https://tele.example.com", cat: "Media", icone: "fa-tv" },
            { nom: "MyDressing", desc: "Organisation de garde-robe", url: "https://dressing.example.com", cat: "Apps", icone: "fa-shirt" },
            { nom: "Documentation QA", desc: "Scripts Playwright & TS", url: "https://github.com/...", cat: "Dev", icone: "fa-code" },
            { nom: "Solar Tracker", desc: "Monitoring panneaux solaires", url: "https://solar.example.com", cat: "IoT", icone: "fa-sun" }
        ];

        const container = document.getElementById('container');
        const statsEl = document.getElementById('stats');
        
        // Calcul des stats
        statsEl.innerHTML = `<i class="fa-solid fa-layer-group mr-2"></i>${sites.length} Projets répertoriés`;

        // Groupement par catégorie
        const categories = [...new Set(sites.map(s => s.cat))].sort();

        categories.forEach(cat => {
            const section = document.createElement('section');
            
            // Titre de catégorie compact
            const header = `<h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center">
                                <span class="h-px w-8 bg-slate-200 mr-3"></span>${cat}
                            </h2>`;
            
            // Grille compacte (2 colonnes sur desktop)
            const grid = document.createElement('div');
            grid.className = "grid grid-cols-1 md:grid-cols-2 gap-3";

            sites.filter(s => s.cat === cat).forEach(s => {
                grid.innerHTML += `
                    <a href="${s.url}" target="_blank" class="group flex items-center p-3 bg-white border border-slate-100 rounded-xl shadow-sm hover:shadow-md hover:border-blue-200 transition-all">
                        <div class="w-10 h-10 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
                            <i class="fa-solid ${s.icone} text-lg"></i>
                        </div>
                        <div class="ml-4">
                            <div class="text-sm font-semibold text-slate-700 group-hover:text-blue-600">${s.nom}</div>
                            <div class="text-xs text-slate-400 truncate max-w-[180px] md:max-w-[220px]">${s.desc}</div>
                        </div>
                        <i class="fa-solid fa-chevron-right ml-auto text-[10px] text-slate-300 group-hover:translate-x-1 transition-transform"></i>
                    </a>
                `;
            });

            section.innerHTML = header;
            section.appendChild(grid);
            container.appendChild(section);
        });
    </script>
</body>
</html>
