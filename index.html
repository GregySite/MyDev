<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets & Sites</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 60px auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        header p { color: var(--text-dim); font-size: 1.1rem; }

        .category-section {
            max-width: 1000px;
            margin: 0 auto 50px auto;
        }

        .category-title {
            display: flex;
            align-items: center;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 25px;
            font-weight: 700;
        }

        .category-title::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.5), transparent);
            margin-left: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .card-image {
            width: 100%;
            height: 150px;
            background: #1e293b; 
            background-size: cover;
            background-position: top center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        a.card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card.private {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .card h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .card.private h3 { text-decoration: line-through; color: var(--text-dim); }

        .card p { 
            color: var(--text-dim); 
            font-size: 0.85rem; 
            margin: 0; 
            flex-grow: 1;
            white-space: pre-line;
        }

        .card-footer {
            margin-top: 15px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card.private .card-footer { color: #ef4444; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mes Réalisations</h1>
        <p>Hub central de mes projets web et outils numériques</p>
    </header>

    <main id="portfolio-container"></main>

    <script>
        // Utilisation de l'API Thum.io pour générer les miniatures automatiquement
        const generatePreview = (url) => `https://image.thum.io/get/width/600/crop/400/${url}`;

        const mesSites = [
            {
                titre: "Parashiot",
                description: "Suivi et étude des Parashiot via Lovable.",
                url: "https://parashiot.lovable.app/",
                image: generatePreview("https://parashiot.lovable.app/"),
                categorie: "Torah & Étude",
                prive: false
            },
            {
                titre: "Tehilim",
                description: "Lecture interactive des Tehilim.",
                url: "https://gregysite.github.io/Tehilim/",
                image: generatePreview("https://gregysite.github.io/Tehilim/"),
                categorie: "Torah & Étude",
                prive: false
            },
            {
                titre: "Mishna",
                description: "Portail dédié à l'étude de la Mishna.",
                url: "https://gregysite.github.io/Mishna/",
                image: generatePreview("https://gregysite.github.io/Mishna/"),
                categorie: "Torah & Étude",
                prive: false
            },
            {
                titre: "Ohavei Tsion",
                description: "Site communautaire sur Jérusalem.",
                url: "https://ohaveitsion.github.io/Jerusalem/",
                image: generatePreview("https://ohaveitsion.github.io/Jerusalem/"),
                categorie: "Jérusalem",
                prive: false
            },
            {
                titre: "Le Kotel",
                description: "Projet autour du Mur des Lamentations.",
                url: "https://gregysite.github.io/Kotel",
                image: generatePreview("https://gregysite.github.io/Kotel"),
                categorie: "Jérusalem",
                prive: false
            },
            {
                titre: "Wash Timer",
                description: "Gestion intelligente du temps de douche.",
                url: "http://washtimer.lovable.app/",
                image: generatePreview("http://washtimer.lovable.app/"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Mydressing",
                description: "Organisation visuelle de garde-robe.",
                url: "https://mydressing.lovable.app/",
                image: generatePreview("https://mydressing.lovable.app/"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Link Players",
                description: "Plateforme Link Players.",
                url: "https://linkplayers.lovable.app/",
                image: generatePreview("https://linkplayers.lovable.app/"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Alert Miklat",
                description: "Système d'information pour les abris.",
                url: "https://gregysite.github.io/AlertMiklat/",
                image: generatePreview("https://gregysite.github.io/AlertMiklat/"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Dépense militaire",
                description: "Outil de décompte en temps réel pour Miklat.",
                url: "https://gregysite.github.io/AlertMiklat/compteur.html",
                image: generatePreview("https://gregysite.github.io/AlertMiklat/compteur.html"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Analytics de missiles",
                description: "Tableau de bord et statistiques.",
                url: "https://gregysite.github.io/AlertMiklat/analytics.html",
                image: generatePreview("https://gregysite.github.io/AlertMiklat/analytics.html"),
                categorie: "Applications Web",
                prive: false
            },
            {
                titre: "Tele Portal",
                description: "Accès restreint à la gestion média.\nPortail IPTV optimisé.",
                url: "",
                image: "https://images.unsplash.com/photo-1614064641913-6b22c7a36f45?q=80&w=600&auto=format&fit=crop", // Image abstraite pour le site privé
                categorie: "Media",
                prive: true
            }
        ];

        const container = document.getElementById('portfolio-container');
        const categories = [...new Set(mesSites.map(site => site.categorie))];

        categories.forEach(categorie => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `<h2 class="category-title">${categorie}</h2><div class="grid-container"></div>`;

            const grid = section.querySelector('.grid-container');
            const sitesDeLaCategorie = mesSites.filter(site => site.categorie === categorie);
            
            sitesDeLaCategorie.forEach(site => {
                let card;
                const cardHTML = `
                    <div class="card-image" style="background-image: url('${site.image}')"></div>
                    <div class="card-content">
                        <h3>${site.titre}</h3>
                        <p>${site.description}</p>
                        <div class="card-footer">${site.prive ? '🔒 ACCÈS PRIVÉ' : 'VOIR LE SITE ➔'}</div>
                    </div>
                `;

                if (site.prive) {
                    card = document.createElement('div');
                    card.className = 'card private';
                } else {
                    card = document.createElement('a');
                    card.className = 'card';
                    card.href = site.url;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                }
                card.innerHTML = cardHTML;
                grid.appendChild(card);
            });
            container.appendChild(section);
        });
    </script>
</body>
</html>
