<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Project Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: #0f121a;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            color: #fff;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .category-section {
            max-width: 1100px;
            margin: 0 auto 60px auto;
        }

        .category-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            font-weight: 700;
        }

        .category-title::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: var(--border);
            margin-left: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        a.card:hover {
            border-color: var(--accent);
            background: #141822;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0,0,0,0.5);
        }

        .card-icon {
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .card p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin: 0 0 20px 0;
            flex-grow: 1;
        }

        .card-footer {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card.private {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .card.private .card-footer { color: #f87171; }

        @media (max-width: 600px) {
            body { padding: 40px 15px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>The Vault</h1>
        <p>A centralized repository of my web experiments and tools.</p>
    </header>

    <main id="portfolio-container"></main>

    <script>
        const projects = [
            { title: "Parashiot", desc: "Real-time tracking and study platform for weekly Parashiot.", url: "https://parashiot.lovable.app/", cat: "Torah & Study", icon: "book-open" },
            { title: "Tehilim", desc: "Interactive portal for Tehilim reading and study.", url: "https://gregysite.github.io/Tehilim/", cat: "Torah & Study", icon: "scroll" },
            { title: "Mishna", desc: "Comprehensive study guide for Mishnaic texts.", url: "https://gregysite.github.io/Mishna/", cat: "Torah & Study", icon: "library" },
            { title: "Ohavei Tsion", desc: "Community-driven site for Jerusalem news and info.", url: "https://ohaveitsion.github.io/Jerusalem/", cat: "Jerusalem", icon: "map-pin" },
            { title: "The Kotel", desc: "Interactive project centered around the Western Wall.", url: "https://gregysite.github.io/Kotel", cat: "Jerusalem", icon: "landmark" },
            { title: "Wash Timer", desc: "Smart utility for shower duration and water management.", url: "http://washtimer.lovable.app/", cat: "Web Applications", icon: "timer" },
            { title: "MyDressing", desc: "Visual wardrobe organizer and style planner.", url: "https://mydressing.lovable.app/", cat: "Web Applications", icon: "shirt" },
            { title: "Link Players", desc: "Advanced platform for player connectivity.", url: "https://linkplayers.lovable.app/", cat: "Web Applications", icon: "users" },
            { title: "Alert Miklat", desc: "Safety information system for shelter locations.", url: "https://gregysite.github.io/AlertMiklat/", cat: "Web Applications", icon: "shield-alert" },
            { title: "Defense Spending", desc: "Real-time counter and analysis for security costs.", url: "https://gregysite.github.io/AlertMiklat/compteur.html", cat: "Web Applications", icon: "trending-up" },
            { title: "Missile Analytics", desc: "Data-driven dashboard for missile tracking stats.", url: "https://gregysite.github.io/AlertMiklat/analytics.html", cat: "Web Applications", icon: "bar-chart-3" },
            { title: "Tele Portal", desc: "Restricted IPTV management and media dashboard.", url: "", cat: "Media", icon: "tv", isPrivate: true }
        ];

        const container = document.getElementById('portfolio-container');
        const cats = [...new Set(projects.map(p => p.cat))];

        cats.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `<h2 class="category-title">${cat}</h2><div class="grid-container"></div>`;

            const grid = section.querySelector('.grid-container');
            projects.filter(p => p.cat === cat).forEach(p => {
                const card = p.isPrivate ? document.createElement('div') : document.createElement('a');
                card.className = `card ${p.isPrivate ? 'private' : ''}`;
                if(!p.isPrivate) {
                    card.href = p.url;
                    card.target = "_blank";
                }

                card.innerHTML = `
                    <div class="card-icon"><i data-lucide="${p.icon}"></i></div>
                    <h3>${p.title}</h3>
                    <p>${p.desc}</p>
                    <div class="card-footer">
                        ${p.isPrivate ? '<i data-lucide="lock" size="14"></i> Restricted Access' : 'Open Project <i data-lucide="external-link" size="14"></i>'}
                    </div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(section);
        });

        // Initialisation des icônes
        lucide.createIcons();
    </script>
</body>
</html>
