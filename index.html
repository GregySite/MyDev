<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Projets & Sites</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2b;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 60px auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        header p { color: var(--text-dim); font-size: 1.1rem; }

        .category-section {
            max-width: 1000px;
            margin: 0 auto 50px auto;
        }

        .category-title {
            display: flex;
            align-items: center;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 25px;
            font-weight: 700;
        }

        .category-title::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.5), transparent);
            margin-left: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Style pour les cartes cliquables uniquement */
        a.card:hover {
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        /* Style pour le mode privé */
        .card.private {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
        
        .card.private h3 {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .card p { color: var(--text-dim); font-size: 0.9rem; margin: 0; flex-grow: 1; }

        .card-footer {
            margin-top: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card.private .card-footer { color: #ef4444; }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mes Réalisations</h1>
        <p>Hub central de mes projets web et outils numériques</p>
    </header>

    <main id="portfolio-container"></main>

    <script>
        const mesSites = [
            {
                titre: "Parashiot",
                description: "Application Lovable pour le suivi et l'étude des Parashiot.",
                url: "https://parashiot.lovable.app/",
                categorie: "Torah & Étude",
                prive: false
            },
            {
                titre: "Tehilim",
                description: "Portail dédié à la lecture des Tehilim.",
                url: "https://gregysite.github.io/Tehilim/",
                categorie: "Torah & Étude",
                prive: false
            },
            {
                titre: "Tele Portal",
                description: "Accès restreint à l'interface de gestion média.",
                url: "", // LIEN SUPPRIMÉ ICI
                categorie: "Media",
                prive: true // MODE PRIVÉ ACTIVÉ
            },
            {
                titre: "Ohavei Tsion",
                description: "Site communautaire et informatif sur Jérusalem.",
                url: "https://ohaveitsion.github.io/Jerusalem/",
                categorie: "Jérusalem",
                prive: false
            },
            {
                titre: "Le Kotel",
                description: "Projet autour du Mur des Lamentations.",
                url: "https://gregysite.github.io/Kotel",
                categorie: "Jérusalem",
                prive: false
            }
        ];

        const container = document.getElementById('portfolio-container');
        const categories = [...new Set(mesSites.map(site => site.categorie))];

        categories.forEach(categorie => {
            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `<h2 class="category-title">${categorie}</h2><div class="grid-container"></div>`;

            const grid = section.querySelector('.grid-container');
            const sitesDeLaCategorie = mesSites.filter(site => site.categorie === categorie);
            
            sitesDeLaCategorie.forEach(site => {
                let card;
                if (site.prive) {
                    // Si privé : on crée une simple DIV (pas de lien <a>)
                    card = document.createElement('div');
                    card.className = 'card private';
                    card.innerHTML = `
                        <h3>${site.titre}</h3>
                        <p>${site.description}</p>
                        <div class="card-footer">🔒 ACCÈS PRIVÉ</div>
                    `;
                } else {
                    // Si public : on crée un lien <a>
                    card = document.createElement('a');
                    card.className = 'card';
                    card.href = site.url;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";
                    card.innerHTML = `
                        <h3>${site.titre}</h3>
                        <p>${site.description}</p>
                        <div class="card-footer">VOIR LE SITE ➔</div>
                    `;
                }
                grid.appendChild(card);
            });
            container.appendChild(section);
        });
    </script>
</body>
</html>
